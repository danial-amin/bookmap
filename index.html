<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookmap — find similar books</title>
    <meta
      name="description"
      content="Type a book and explore similar titles on an interactive map."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <header class="header">
        <div class="brand">
          <h1>Bookmap</h1>
          <p class="tagline">The tourist map of books</p>
        </div>
        <form id="search-form" class="search" role="search" autocomplete="off">
          <label class="sr-only" for="search-input">Book title</label>
          <input
            id="search-input"
            type="search"
            placeholder="Type a book title…"
            spellcheck="false"
          />
          <button type="submit">Explore</button>
        </form>
        <p id="status" class="status" aria-live="polite"></p>
      </header>

      <div id="map-wrap" class="map-wrap">
        <canvas id="map-canvas" aria-hidden="true"></canvas>
        <div id="map-labels" class="map-labels"></div>
        <div class="map-hint">
          Drag to pan · scroll to zoom · click a title ·
          <a href="https://openlibrary.org/" target="_blank" rel="noopener">Open Library</a>
        </div>
      </div>

      <aside id="detail" class="detail hidden" aria-labelledby="detail-title">
        <button type="button" id="detail-close" class="detail-close" aria-label="Close">
          ×
        </button>
        <h2 id="detail-title"></h2>
        <p id="detail-author" class="detail-author"></p>
        <p id="detail-blurb" class="detail-blurb"></p>
        <a id="detail-link" class="detail-link" href="#" target="_blank" rel="noopener">
          View on Open Library →
        </a>
      </aside>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
